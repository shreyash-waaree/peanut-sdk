server.port=8080

# Multipart: WAV from robot (16 kHz mono ~10 s is under 1 MB)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# ---- Whisper speech-to-text (POST /speech-transcribe) ---------------------
speech.whisper.enabled=true

# Fast path: persistent Python sidecar keeps Whisper loaded in memory. Short
# utterances transcribe in ~200-600 ms on CPU with base.en. Start it with:
#     python -m pip install -r requirements-whisper.txt
#     python whisper_server.py
# Set to empty to disable the sidecar path (falls back to the subprocess mode).
speech.whisper.sidecar-url=http://127.0.0.1:9090/transcribe
speech.whisper.sidecar-connect-ms=800
speech.whisper.sidecar-read-ms=15000

# Slow fallback: spawn a fresh python process per request. Only used if the
# sidecar is unreachable. Empty to disable.
speech.whisper.command=python,transcribe_whisper.py,{audio}
speech.whisper.timeout-sec=60
